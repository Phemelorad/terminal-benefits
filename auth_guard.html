<!-- ============================================================
  AUTH GUARD — paste this SCRIPT block at the very top of the
  <script> section in BOTH index.html and status.html
  It redirects anyone not logged in back to login.html
  and populates the "Logged in as" email in the header.
============================================================ -->

<script>
  const SUPABASE_URL  = 'https://YOUR_PROJECT_ID.supabase.co';
  const SUPABASE_ANON = 'YOUR_ANON_PUBLIC_KEY';

  const { createClient } = supabase;
  const db = createClient(SUPABASE_URL, SUPABASE_ANON);

  // ── Auth guard: redirect to login if not signed in ────
  (async () => {
    const { data: { session } } = await db.auth.getSession();

    if (!session) {
      location.replace('login.html');
      return;
    }

    // Show email in header
    const email = session.user.email;
    const el = document.getElementById('user-email');
    if (el) el.textContent = email;
  })();

  // ── Logout ────────────────────────────────────────────
  async function logout() {
    await db.auth.signOut();
    location.replace('login.html');
  }
</script>
