<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Entries — Terminal Benefits</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Source+Sans+3:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root {
      --navy: #0f1f3d;
      --navy-mid: #1a3260;
      --navy-light: #253d6e;
      --gold: #c8a84b;
      --gold-light: #e8d090;
      --cream: #f8f5ee;
      --cream-dark: #ede9df;
      --ink: #1c1c1c;
      --muted: #6b6559;
      --border: #d4cfc4;
      --white: #ffffff;

      --status-pending:    #92600a;
      --status-pending-bg: #fef3c7;
      --status-review:     #1e40af;
      --status-review-bg:  #dbeafe;
      --status-approved:   #166534;
      --status-approved-bg:#dcfce7;
      --status-rejected:   #991b1b;
      --status-rejected-bg:#fee2e2;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Source Sans 3', sans-serif;
      background: var(--cream);
      color: var(--ink);
      min-height: 100vh;
    }

    .site-header { background: var(--navy); border-bottom: 3px solid var(--gold); }
    .header-top { display: flex; align-items: stretch; min-height: 90px; }

    .header-crest {
      background: var(--navy-mid); width: 90px;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; border-right: 1px solid rgba(200,168,75,0.3);
    }

    .crest-icon {
      display: flex; align-items: center; justify-content: center;
      color: var(--gold); font-size: 22px;
    }

    .header-titles {
      flex: 1; padding: 18px 28px;
      display: flex; flex-direction: column; justify-content: center;
    }

    .header-titles h1 {
      font-family: 'Playfair Display', serif;
      font-size: 1.45rem; font-weight: 700;
      color: var(--white); letter-spacing: 0.02em; line-height: 1.2;
    }

    .header-titles .tagline {
      font-size: 0.78rem; color: var(--gold-light);
      letter-spacing: 0.12em; text-transform: uppercase;
      margin-top: 4px; font-weight: 300;
    }

    .header-user {
      background: rgba(255,255,255,0.04);
      border-left: 1px solid rgba(200,168,75,0.25);
      padding: 14px 24px;
      display: flex; flex-direction: column;
      align-items: flex-end; justify-content: center; min-width: 220px;
    }

    .user-label    { font-size: 0.7rem; color: var(--gold-light); letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 2px; }
    .user-name     { font-size: 0.95rem; color: var(--white); font-weight: 600; line-height: 1.2; }
    .user-meta     { display: flex; align-items: center; gap: 8px; margin-top: 4px; margin-bottom: 10px; }
    .user-dept     { font-size: 0.72rem; color: rgba(255,255,255,0.45); }

    .role-badge {
      font-size: 0.62rem; font-weight: 700;
      letter-spacing: 0.1em; text-transform: uppercase;
      padding: 2px 8px; border-radius: 2px;
    }
    .role-admin   { background: rgba(200,168,75,0.25); color: var(--gold); }
    .role-officer { background: rgba(255,255,255,0.1);  color: rgba(255,255,255,0.6); }
    .role-viewer  { background: rgba(255,255,255,0.06); color: rgba(255,255,255,0.4); }

    .btn-logout {
      background: transparent; border: 1px solid rgba(200,168,75,0.4);
      color: var(--gold-light); font-family: 'Source Sans 3', sans-serif;
      font-size: 0.72rem; letter-spacing: 0.08em; padding: 5px 14px;
      cursor: pointer; transition: all 0.2s; text-transform: uppercase;
    }
    .btn-logout:hover { background: var(--gold); color: var(--navy); border-color: var(--gold); }

    .site-nav { background: var(--navy-mid); display: flex; padding: 0 90px; }
    .site-nav button {
      background: none; border: none; color: rgba(255,255,255,0.65);
      font-family: 'Source Sans 3', sans-serif; font-size: 0.8rem;
      font-weight: 500; letter-spacing: 0.1em; text-transform: uppercase;
      padding: 11px 22px; cursor: pointer;
      border-bottom: 2px solid transparent; transition: all 0.2s;
    }
    .site-nav button:hover, .site-nav button.active { color: var(--gold); border-bottom-color: var(--gold); }

    .page-wrapper { max-width: 1300px; margin: 0 auto; padding: 40px 24px 80px; }

    .top-bar {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 28px; flex-wrap: wrap; gap: 16px;
    }

    .page-title {
      font-family: 'Playfair Display', serif;
      font-size: 1.6rem; font-weight: 700; color: var(--navy);
    }

    .page-title span {
      font-family: 'Source Sans 3', sans-serif;
      font-size: 0.8rem; font-weight: 500;
      color: var(--muted); letter-spacing: 0.06em;
      margin-left: 12px; vertical-align: middle;
    }

    .top-actions { display: flex; gap: 10px; align-items: center; }

    .btn-new {
      background: var(--navy); color: var(--white);
      border: none; font-family: 'Source Sans 3', sans-serif;
      font-size: 0.8rem; font-weight: 600;
      letter-spacing: 0.1em; text-transform: uppercase;
      padding: 10px 24px; cursor: pointer;
      border-bottom: 2px solid var(--gold); transition: all 0.2s;
    }
    .btn-new:hover { background: var(--navy-mid); transform: translateY(-1px); }

    .btn-refresh {
      background: var(--white); color: var(--navy);
      border: 1px solid var(--border);
      font-family: 'Source Sans 3', sans-serif;
      font-size: 0.8rem; font-weight: 600;
      letter-spacing: 0.08em; text-transform: uppercase;
      padding: 10px 20px; cursor: pointer; transition: all 0.2s;
    }
    .btn-refresh:hover { border-color: var(--navy); background: var(--cream); }

    .stats-row {
      display: grid; grid-template-columns: repeat(4, 1fr);
      gap: 16px; margin-bottom: 28px;
    }

    .stat-card {
      background: var(--white); border: 1px solid var(--border);
      border-top: 3px solid var(--navy); padding: 20px 24px;
      opacity: 0; transform: translateY(12px);
      animation: fadeUp 0.4s ease forwards;
    }

    .stat-card:nth-child(1) { animation-delay: 0.05s; border-top-color: var(--navy); }
    .stat-card:nth-child(2) { animation-delay: 0.10s; border-top-color: var(--gold); }
    .stat-card:nth-child(3) { animation-delay: 0.15s; border-top-color: #166534; }
    .stat-card:nth-child(4) { animation-delay: 0.20s; border-top-color: #991b1b; }

    @keyframes fadeUp { to { opacity: 1; transform: translateY(0); } }

    .stat-label { font-size: 0.68rem; font-weight: 600; letter-spacing: 0.12em; text-transform: uppercase; color: var(--muted); margin-bottom: 8px; }
    .stat-value { font-family: 'Playfair Display', serif; font-size: 2rem; font-weight: 700; color: var(--navy); line-height: 1; }
    .stat-sub   { font-size: 0.75rem; color: var(--muted); margin-top: 4px; }

    .filters-bar {
      background: var(--white); border: 1px solid var(--border);
      padding: 16px 24px;
      display: flex; gap: 14px; align-items: center;
      flex-wrap: wrap; margin-bottom: 2px;
    }

    .filter-label { font-size: 0.72rem; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); white-space: nowrap; }

    .filter-input, .filter-select {
      font-family: 'Source Sans 3', sans-serif;
      font-size: 0.85rem; color: var(--ink);
      background: var(--cream); border: 1px solid var(--border);
      padding: 7px 12px; outline: none; transition: border-color 0.15s;
    }
    .filter-input  { flex: 1; min-width: 180px; }
    .filter-select { min-width: 150px; -webkit-appearance: none; appearance: none; cursor: pointer; }
    .filter-input:focus, .filter-select:focus { border-color: var(--navy-mid); background: var(--white); }

    .filter-divider { width: 1px; height: 28px; background: var(--border); }
    .entry-count { font-size: 0.78rem; color: var(--muted); white-space: nowrap; margin-left: auto; }

    .table-wrap {
      background: var(--white); border: 1px solid var(--border); border-top: none;
      overflow-x: auto;
    }

    table { width: 100%; border-collapse: collapse; min-width: 900px; }
    thead { background: var(--navy); position: sticky; top: 0; z-index: 2; }

    thead th {
      font-family: 'Source Sans 3', sans-serif;
      font-size: 0.68rem; font-weight: 600;
      letter-spacing: 0.12em; text-transform: uppercase;
      color: var(--gold-light); padding: 13px 16px; text-align: left;
      white-space: nowrap; cursor: pointer; user-select: none; transition: color 0.15s;
    }
    thead th:hover { color: var(--gold); }
    thead th.sorted { color: var(--gold); }
    thead th .sort-arrow { margin-left: 4px; opacity: 0.5; font-size: 10px; }
    thead th.sorted .sort-arrow { opacity: 1; }

    tbody tr {
      border-bottom: 1px solid var(--cream-dark);
      transition: background 0.12s;
      opacity: 0; animation: rowFade 0.3s ease forwards;
    }
    @keyframes rowFade { to { opacity: 1; } }
    tbody tr:hover { background: #f5f2eb; }
    tbody tr:last-child { border-bottom: none; }

    td { padding: 13px 16px; font-size: 0.85rem; color: var(--ink); white-space: nowrap; }

    .td-name { font-weight: 600; color: var(--navy); }
    .td-dept { font-size: 0.78rem; color: var(--muted); }
    .td-date { font-size: 0.82rem; font-variant-numeric: tabular-nums; }

    .delay-pill {
      display: inline-block; padding: 2px 9px;
      border-radius: 2px; font-size: 0.75rem;
      font-weight: 600; font-variant-numeric: tabular-nums;
    }
    .delay-ok   { background: #dcfce7; color: #166534; }
    .delay-warn { background: #fef9c3; color: #854d0e; }
    .delay-bad  { background: #fee2e2; color: #991b1b; }

    .badge {
      display: inline-flex; align-items: center; gap: 5px;
      padding: 3px 10px; font-size: 0.72rem;
      font-weight: 600; letter-spacing: 0.06em;
      text-transform: uppercase; border-radius: 2px; white-space: nowrap;
    }
    .badge-dot { width: 6px; height: 6px; border-radius: 50%; }

    .badge-Pending      { background: var(--status-pending-bg);  color: var(--status-pending); }
    .badge-dot-Pending  { background: var(--status-pending); }
    .badge-Approved     { background: var(--status-approved-bg); color: var(--status-approved); }
    .badge-dot-Approved { background: var(--status-approved); }
    .badge-Rejected     { background: var(--status-rejected-bg); color: var(--status-rejected); }
    .badge-dot-Rejected { background: var(--status-rejected); }

    .btn-view {
      background: none; border: 1px solid var(--border);
      color: var(--navy); font-family: 'Source Sans 3', sans-serif;
      font-size: 0.72rem; font-weight: 600; letter-spacing: 0.08em;
      text-transform: uppercase; padding: 5px 12px; cursor: pointer; transition: all 0.15s;
    }
    .btn-view:hover { background: var(--navy); color: var(--white); border-color: var(--navy); }

    .state-panel {
      padding: 72px 24px; text-align: center;
      background: var(--white); border: 1px solid var(--border); border-top: none;
    }
    .state-icon  { font-size: 2.5rem; margin-bottom: 14px; opacity: 0.35; }
    .state-title { font-family: 'Playfair Display', serif; font-size: 1.2rem; color: var(--navy); margin-bottom: 8px; }
    .state-sub   { font-size: 0.85rem; color: var(--muted); }

    .spinner {
      display: inline-block; width: 32px; height: 32px;
      border: 3px solid var(--cream-dark);
      border-top-color: var(--navy); border-radius: 50%;
      animation: spin 0.7s linear infinite; margin-bottom: 16px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .modal-overlay {
      position: fixed; inset: 0;
      background: rgba(10,20,40,0.55); backdrop-filter: blur(3px);
      z-index: 100; display: none; align-items: center; justify-content: center; padding: 24px;
    }
    .modal-overlay.open { display: flex; }

    .modal {
      background: var(--white); max-width: 680px; width: 100%;
      border-top: 4px solid var(--navy); max-height: 90vh; overflow-y: auto;
      animation: modalIn 0.25s ease;
    }
    @keyframes modalIn { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

    .modal-header {
      background: var(--navy); padding: 20px 28px;
      display: flex; align-items: flex-start; justify-content: space-between;
    }
    .modal-title { font-family: 'Playfair Display', serif; font-size: 1.1rem; color: var(--white); }
    .modal-id    { font-size: 0.75rem; color: var(--gold-light); margin-top: 3px; letter-spacing: 0.06em; }
    .modal-close {
      background: none; border: none; color: rgba(255,255,255,0.5);
      font-size: 1.4rem; cursor: pointer; line-height: 1; transition: color 0.15s; padding: 0;
    }
    .modal-close:hover { color: var(--white); }
    .modal-body { padding: 28px; }
    .modal-section { margin-bottom: 24px; }
    .modal-section-title {
      font-size: 0.68rem; font-weight: 700; letter-spacing: 0.14em;
      text-transform: uppercase; color: var(--gold);
      margin-bottom: 14px; padding-bottom: 8px; border-bottom: 1px solid var(--cream-dark);
    }
    .modal-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
    .modal-field label { font-size: 0.68rem; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); display: block; margin-bottom: 3px; }
    .modal-field .val  { font-size: 0.9rem; color: var(--ink); font-weight: 500; }
    .modal-delays { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
    .delay-card { background: var(--cream); border: 1px solid var(--border); padding: 12px; text-align: center; }
    .delay-card .d-label { font-size: 0.65rem; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); margin-bottom: 6px; }
    .delay-card .d-value { font-family: 'Playfair Display', serif; font-size: 1.5rem; font-weight: 700; color: var(--navy); line-height: 1; }
    .delay-card .d-unit  { font-size: 0.68rem; color: var(--muted); margin-top: 2px; }

    .modal-footer {
      padding: 16px 28px; background: var(--cream-dark);
      border-top: 1px solid var(--border); display: flex; justify-content: flex-end; gap: 10px;
    }
    .btn-close-modal {
      background: var(--navy); color: var(--white); border: none;
      font-family: 'Source Sans 3', sans-serif; font-size: 0.8rem;
      font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase;
      padding: 10px 28px; cursor: pointer; transition: all 0.2s; border-bottom: 2px solid var(--gold);
    }
    .btn-close-modal:hover { background: var(--navy-mid); }

    .pagination {
      display: flex; align-items: center; justify-content: space-between;
      padding: 14px 20px; background: var(--white);
      border: 1px solid var(--border); border-top: none;
    }
    .page-info { font-size: 0.78rem; color: var(--muted); }
    .page-btns { display: flex; gap: 4px; }
    .page-btn {
      background: var(--cream); border: 1px solid var(--border);
      color: var(--ink); font-family: 'Source Sans 3', sans-serif;
      font-size: 0.78rem; font-weight: 600;
      padding: 6px 12px; cursor: pointer; transition: all 0.15s;
    }
    .page-btn:hover:not(:disabled) { background: var(--navy); color: var(--white); border-color: var(--navy); }
    .page-btn.active  { background: var(--navy); color: var(--white); border-color: var(--navy); }
    .page-btn:disabled { opacity: 0.4; cursor: not-allowed; }

    @media (max-width: 768px) {
      .stats-row { grid-template-columns: 1fr 1fr; }
      .header-user { display: none; }
      .modal-grid, .modal-delays { grid-template-columns: 1fr 1fr; }
    }
  </style>
</head>
<body>

<header class="site-header">
  <div class="header-top">
    <div class="header-crest">
      <div class="crest-icon"><img src="Code-of-Arms-colour.png" style="width:100px;height:50px;" alt="coa"></div>
    </div>
    <div class="header-titles">
      <h1>Management Services Terminal Benefits Form</h1>
      <div class="tagline">Ministry of Labour & Home Affairs &nbsp;·&nbsp; Management Services</div>
    </div>
    <div class="header-user">
      <div class="user-label">Logged in as</div>
      <div class="user-name" id="user-email">Loading…</div>
      <div class="user-meta">
        <span class="role-badge" id="user-role"></span>
        <span class="user-dept"  id="user-dept"></span>
      </div>
      <button class="btn-logout" onclick="logout()">Sign Out</button>
    </div>
  </div>
  <nav class="site-nav">
    <button onclick="location.href='index.html'">Home</button>
    <button onclick="location.href='dashboard.html'">Form</button>
    <button class="active">Entries</button>
  </nav>
</header>

<div class="page-wrapper">
  <div class="top-bar">
    <div class="page-title">
      All Entries
      <span id="total-count-label">Loading…</span>
    </div>
    <div class="top-actions">
      <button class="btn-refresh" onclick="loadEntries()">↺ Refresh</button>
      <button class="btn-new" onclick="location.href='dashboard.html'">+ New Application</button>
    </div>
  </div>

  <div class="stats-row">
    <div class="stat-card">
      <div class="stat-label">Total Applications</div>
      <div class="stat-value" id="stat-total">—</div>
      <div class="stat-sub">all time</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Pending</div>
      <div class="stat-value" id="stat-pending">—</div>
      <div class="stat-sub">awaiting review</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Approved</div>
      <div class="stat-value" id="stat-approved">—</div>
      <div class="stat-sub">processed</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Avg. Processing</div>
      <div class="stat-value" id="stat-avg">—</div>
      <div class="stat-sub">days total</div>
    </div>
  </div>

  <div class="filters-bar">
    <span class="filter-label">Filter</span>
    <input  class="filter-input"  id="search"       type="text" placeholder="Search by name, department…" oninput="applyFilters()">
    <div class="filter-divider"></div>
    <select class="filter-select" id="filter-status" onchange="applyFilters()">
      <option value="">All Statuses</option>
      <option value="Pending">Pending</option>
      <option value="Under Review">Under Review</option>
      <option value="Approved">Approved</option>
      <option value="Rejected">Rejected</option>
    </select>
    <select class="filter-select" id="filter-dept"   onchange="applyFilters()">
      <option value="">All Departments</option>
      <option value="DIC">Immigration & Citizenship</option>
      <option value="CS">Corporate Services</option>
      <option value="CNR">Civil & National Registration</option>
      <option value="OSH">Occupational Health & Safety</option>
      <option value="LSS">Labour & Social Security</option>
      <option value="DES">Employment Services</option>
    </select>
    <select class="filter-select" id="filter-reason" onchange="applyFilters()">
      <option value="">All Reasons</option>
      <option value="Retirement">Retirement</option>
      <option value="Resignation">Resignation</option>
      <option value="Dismissal">Dismissal</option>
      <option value="Death">Death</option>
    </select>
    <span class="entry-count" id="entry-count"></span>
  </div>

  <div id="table-container"></div>

  <div class="pagination" id="pagination" style="display:none">
    <div class="page-info" id="page-info"></div>
    <div class="page-btns" id="page-btns"></div>
  </div>
</div>

<div class="modal-overlay" id="modal" onclick="closeModal(event)">
  <div class="modal" id="modal-box">
    <div class="modal-header">
      <div>
        <div class="modal-title" id="modal-name"></div>
        <div class="modal-id"   id="modal-id"></div>
      </div>
      <button class="modal-close" onclick="closeModalDirect()">✕</button>
    </div>
    <div class="modal-body" id="modal-body"></div>
    <div class="modal-footer">
      <button class="btn-close-modal" onclick="closeModalDirect()">Close</button>
    </div>
  </div>
</div>

<script>
  // ── Supabase — single declaration ─────────────────────
  const SUPABASE_URL  = 'https://qrxfpmuvtsklgitiuosh.supabase.co';
  const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFyeGZwbXV2dHNrbGdpdGl1b3NoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMwMzE5ODksImV4cCI6MjA4ODYwNzk4OX0.8AlSa32_3TqrSAqlikg6618gAxXtmC5vVLd1acrJeMo';

  const { createClient } = supabase;
  const db = createClient(SUPABASE_URL, SUPABASE_ANON);

  // ── Auth guard + populate header + then load data ─────
  (async () => {
    const { data: { session } } = await db.auth.getSession();

    // FIX 1: added 'return' so logged-in users are NOT redirected
    if (!session) {
      location.replace('index.html');
      return;
    }

    // Pull profile
    const { data: profile } = await db
      .from('user_profiles')
      .select('full_name, role, department_code')
      .eq('id', session.user.id)
      .single();

    const name = profile?.full_name || session.user.email;
    const role = profile?.role      || 'officer';
    const dept = profile?.department_code || '';

    const emailEl = document.getElementById('user-email');
    if (emailEl) emailEl.textContent = name;

    const roleEl = document.getElementById('user-role');
    if (roleEl) {
      roleEl.textContent = role.charAt(0).toUpperCase() + role.slice(1);
      roleEl.className   = `role-badge role-${role}`;
    }

    const deptEl = document.getElementById('user-dept');
    if (deptEl && dept) deptEl.textContent = dept;

    sessionStorage.setItem('user_name',  name);
    sessionStorage.setItem('user_email', session.user.email);
    sessionStorage.setItem('user_role',  role);
    sessionStorage.setItem('user_dept',  dept);
    sessionStorage.setItem('user_id',    session.user.id);

    // FIX 2: load entries only AFTER auth is confirmed
    loadEntries();
  })();

  // ── Logout ────────────────────────────────────────────
  async function logout() {
    sessionStorage.clear();
    await db.auth.signOut();
    location.replace('index.html');
  }

  // ── State ─────────────────────────────────────────────
  let allEntries  = [];
  let filtered    = [];
  let currentPage = 1;
  const PAGE_SIZE = 15;
  let sortCol     = 'submitted_at';
  let sortAsc     = false;

  // ── Load from Supabase ────────────────────────────────
  async function loadEntries() {
    showLoading();

    const { data, error } = await db
      .from('applications')
      .select(`
        id, status, submitted_at, submitted_by,
        date_officer_gave_notice, date_exited_service,
        date_submitted_to_mfed, date_leave_days_paid,
        date_submitted_to_bpopf, actual_date_paid,
        delay1_notice_to_exit, delay2_exit_to_mfed,
        delay3_mfed_to_leave_paid, delay4_leave_paid_to_bpopf,
        delay5_bpopf_to_paid, total_processing_days,
        tpt, public_holidays, comments,
        officers (
          id, first_name, middle_name, surname,
          designation, grade,
          departments ( code, name )
        ),
        reasons_for_leaving ( code, label )
      `)
      .order('submitted_at', { ascending: false });

    if (error) { showError(error.message); return; }

    allEntries = data || [];
    updateStats();
    applyFilters();
  }

  function updateStats() {
    document.getElementById('stat-total').textContent    = allEntries.length;
    document.getElementById('stat-pending').textContent  = allEntries.filter(e => e.status === 'Pending').length;
    document.getElementById('stat-approved').textContent = allEntries.filter(e => e.status === 'Approved').length;

    const withDays = allEntries.filter(e => e.total_processing_days != null);
    const avg = withDays.length
      ? Math.round(withDays.reduce((s, e) => s + e.total_processing_days, 0) / withDays.length)
      : '—';
    document.getElementById('stat-avg').textContent = avg;
  }

  function applyFilters() {
    const search = document.getElementById('search').value.toLowerCase();
    const status = document.getElementById('filter-status').value;
    const dept   = document.getElementById('filter-dept').value;
    const reason = document.getElementById('filter-reason').value;

    filtered = allEntries.filter(e => {
      const name       = fullName(e).toLowerCase();
      const deptCode   = e.officers?.departments?.code || '';
      const reasonCode = e.reasons_for_leaving?.code  || '';

      if (search && !name.includes(search) &&
          !deptCode.toLowerCase().includes(search) &&
          !(e.officers?.departments?.name || '').toLowerCase().includes(search)) return false;
      if (status && e.status !== status)   return false;
      if (dept   && deptCode !== dept)     return false;
      if (reason && reasonCode !== reason) return false;
      return true;
    });

    filtered.sort((a, b) => {
      let va = getSortVal(a, sortCol);
      let vb = getSortVal(b, sortCol);
      if (va < vb) return sortAsc ? -1 :  1;
      if (va > vb) return sortAsc ?  1 : -1;
      return 0;
    });

    currentPage = 1;
    document.getElementById('entry-count').textContent       = `${filtered.length} result${filtered.length !== 1 ? 's' : ''}`;
    document.getElementById('total-count-label').textContent = `${allEntries.length} total`;
    renderTable();
  }

  function getSortVal(e, col) {
    switch(col) {
      case 'name':         return fullName(e).toLowerCase();
      case 'dept':         return e.officers?.departments?.code || '';
      case 'reason':       return e.reasons_for_leaving?.label  || '';
      case 'total_days':   return e.total_processing_days ?? 9999;
      case 'submitted_at': return e.submitted_at || '';
      case 'status':       return e.status       || '';
      default:             return '';
    }
  }

  function setSort(col) {
    if (sortCol === col) sortAsc = !sortAsc;
    else { sortCol = col; sortAsc = true; }
    applyFilters();
  }

  function renderTable() {
    const container = document.getElementById('table-container');

    if (!filtered.length) {
      container.innerHTML = `
        <div class="state-panel">
          <div class="state-icon">🗂</div>
          <div class="state-title">No entries found</div>
          <div class="state-sub">Try adjusting your filters or add a new application.</div>
        </div>`;
      document.getElementById('pagination').style.display = 'none';
      return;
    }

    const start = (currentPage - 1) * PAGE_SIZE;
    const slice = filtered.slice(start, start + PAGE_SIZE);
    const arrow = col => `<span class="sort-arrow">${sortCol === col ? (sortAsc ? '▲' : '▼') : '⇅'}</span>`;

    container.innerHTML = `
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th onclick="setSort('name')"         class="${sortCol==='name'?'sorted':''}">Officer ${arrow('name')}</th>
              <th onclick="setSort('dept')"         class="${sortCol==='dept'?'sorted':''}">Department ${arrow('dept')}</th>
              <th onclick="setSort('reason')"       class="${sortCol==='reason'?'sorted':''}">Reason ${arrow('reason')}</th>
              <th>Date Gave Notice</th>
              <th>Date Exited</th>
              <th>Actual Paid</th>
              <th onclick="setSort('total_days')"   class="${sortCol==='total_days'?'sorted':''}">Total Days ${arrow('total_days')}</th>
              <th onclick="setSort('status')"       class="${sortCol==='status'?'sorted':''}">Status ${arrow('status')}</th>
              <th onclick="setSort('submitted_at')" class="${sortCol==='submitted_at'?'sorted':''}">Submitted ${arrow('submitted_at')}</th>
              <th></th>
            </tr>
          </thead>
          <tbody>
            ${slice.map((e, i) => rowHTML(e, i)).join('')}
          </tbody>
        </table>
      </div>`;

    renderPagination();
  }

  function rowHTML(e, i) {
    const o    = e.officers || {};
    const dept = o.departments || {};
    const days = e.total_processing_days;
    const delayClass = days == null ? '' : days <= 30 ? 'delay-ok' : days <= 60 ? 'delay-warn' : 'delay-bad';
    const dateStr = d => d ? new Date(d).toLocaleDateString('en-GB',{day:'2-digit',month:'short',year:'numeric'}) : '—';
    const subDate = e.submitted_at ? new Date(e.submitted_at).toLocaleDateString('en-GB',{day:'2-digit',month:'short',year:'numeric'}) : '—';

    return `
      <tr style="animation-delay:${i * 0.03}s">
        <td>
          <div class="td-name">${fullName(e)}</div>
          <div class="td-dept">${o.designation || ''} · ${o.grade || ''}</div>
        </td>
        <td>
          <div>${dept.code || '—'}</div>
          <div class="td-dept">${dept.name || ''}</div>
        </td>
        <td>${e.reasons_for_leaving?.label || '—'}</td>
        <td class="td-date">${dateStr(e.date_officer_gave_notice)}</td>
        <td class="td-date">${dateStr(e.date_exited_service)}</td>
        <td class="td-date">${dateStr(e.actual_date_paid)}</td>
        <td><span class="delay-pill ${delayClass}">${days ?? '—'} days</span></td>
        <td>${badgeHTML(e.status)}</td>
        <td class="td-date">${subDate}</td>
        <td><button class="btn-view" onclick="openModal(${e.id})">View</button></td>
      </tr>`;
  }

  function badgeHTML(status) {
    const s = status || 'Pending';
    return `<span class="badge badge-${s}"><span class="badge-dot badge-dot-${s}"></span>${s}</span>`;
  }

  function renderPagination() {
    const total = filtered.length;
    const pages = Math.ceil(total / PAGE_SIZE);
    const pag   = document.getElementById('pagination');

    if (pages <= 1) { pag.style.display = 'none'; return; }
    pag.style.display = 'flex';

    const start = (currentPage - 1) * PAGE_SIZE + 1;
    const end   = Math.min(currentPage * PAGE_SIZE, total);
    document.getElementById('page-info').textContent = `Showing ${start}–${end} of ${total}`;

    let btns = `<button class="page-btn" onclick="goPage(${currentPage-1})" ${currentPage===1?'disabled':''}>‹ Prev</button>`;
    for (let p = 1; p <= pages; p++) {
      if (pages > 7 && Math.abs(p - currentPage) > 2 && p !== 1 && p !== pages) {
        if (p === 2 || p === pages - 1) btns += `<span style="padding:6px 4px;color:var(--muted)">…</span>`;
        continue;
      }
      btns += `<button class="page-btn ${p===currentPage?'active':''}" onclick="goPage(${p})">${p}</button>`;
    }
    btns += `<button class="page-btn" onclick="goPage(${currentPage+1})" ${currentPage===pages?'disabled':''}>Next ›</button>`;
    document.getElementById('page-btns').innerHTML = btns;
  }

  function goPage(p) {
    const pages = Math.ceil(filtered.length / PAGE_SIZE);
    if (p < 1 || p > pages) return;
    currentPage = p;
    renderTable();
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }

  function openModal(id) {
    const e = allEntries.find(x => x.id === id);
    if (!e) return;

    const o   = e.officers || {};
    const dept = o.departments || {};
    const fmt  = d => d ? new Date(d).toLocaleDateString('en-GB',{day:'2-digit',month:'long',year:'numeric'}) : '—';

    document.getElementById('modal-name').textContent = fullName(e);
    document.getElementById('modal-id').textContent   = `Application #${e.id} · Submitted ${fmt(e.submitted_at)}`;

    document.getElementById('modal-body').innerHTML = `
      <div class="modal-section">
        <div class="modal-section-title">Personal Information</div>
        <div class="modal-grid">
          <div class="modal-field"><label>Full Name</label><div class="val">${fullName(e)}</div></div>
          <div class="modal-field"><label>Designation</label><div class="val">${o.designation || '—'}</div></div>
          <div class="modal-field"><label>Grade</label><div class="val">${o.grade || '—'}</div></div>
          <div class="modal-field"><label>Department</label><div class="val">${dept.name || '—'}</div></div>
          <div class="modal-field"><label>Reason for Leaving</label><div class="val">${e.reasons_for_leaving?.label || '—'}</div></div>
          <div class="modal-field"><label>Status</label><div class="val">${badgeHTML(e.status)}</div></div>
        </div>
      </div>
      <div class="modal-section">
        <div class="modal-section-title">Processing Dates</div>
        <div class="modal-grid">
          <div class="modal-field"><label>Date Gave Notice</label><div class="val">${fmt(e.date_officer_gave_notice)}</div></div>
          <div class="modal-field"><label>Date Exited Service</label><div class="val">${fmt(e.date_exited_service)}</div></div>
          <div class="modal-field"><label>Date Submitted to MFED</label><div class="val">${fmt(e.date_submitted_to_mfed)}</div></div>
          <div class="modal-field"><label>Date Leave Days Paid</label><div class="val">${fmt(e.date_leave_days_paid)}</div></div>
          <div class="modal-field"><label>Date Submitted to BPOPF</label><div class="val">${fmt(e.date_submitted_to_bpopf)}</div></div>
          <div class="modal-field"><label>Actual Date Paid</label><div class="val">${fmt(e.actual_date_paid)}</div></div>
        </div>
      </div>
      <div class="modal-section">
        <div class="modal-section-title">Processing Delays (days)</div>
        <div class="modal-delays">
          ${delayCard('Notice → Exit',      e.delay1_notice_to_exit)}
          ${delayCard('Exit → MFED',        e.delay2_exit_to_mfed)}
          ${delayCard('MFED → Leave Paid',  e.delay3_mfed_to_leave_paid)}
          ${delayCard('Leave Paid → BPOPF', e.delay4_leave_paid_to_bpopf)}
          ${delayCard('BPOPF → Paid',       e.delay5_bpopf_to_paid)}
          ${delayCard('Total Processing',   e.total_processing_days, true)}
        </div>
      </div>
      ${(e.tpt || e.public_holidays || e.comments) ? `
      <div class="modal-section">
        <div class="modal-section-title">Additional Information</div>
        <div class="modal-grid">
          ${e.tpt             ? `<div class="modal-field"><label>TPT</label><div class="val">${e.tpt}</div></div>` : ''}
          ${e.public_holidays ? `<div class="modal-field"><label>Public Holidays</label><div class="val">${e.public_holidays}</div></div>` : ''}
          ${e.comments        ? `<div class="modal-field" style="grid-column:1/-1"><label>Comments</label><div class="val">${e.comments}</div></div>` : ''}
        </div>
      </div>` : ''}
      <div class="modal-section">
        <div class="modal-section-title">Submission Info</div>
        <div class="modal-grid">
          <div class="modal-field"><label>Submitted By</label><div class="val">${e.submitted_by || '—'}</div></div>
          <div class="modal-field"><label>Submitted At</label><div class="val">${fmt(e.submitted_at)}</div></div>
        </div>
      </div>`;

    document.getElementById('modal').classList.add('open');
    document.body.style.overflow = 'hidden';
  }

  function delayCard(label, val, highlight = false) {
    const v     = val ?? '—';
    const color = highlight ? 'var(--navy)'
                : val == null ? 'var(--muted)'
                : val <= 14  ? '#166534'
                : val <= 30  ? '#854d0e'
                : '#991b1b';
    return `
      <div class="delay-card">
        <div class="d-label">${label}</div>
        <div class="d-value" style="color:${color}">${v}</div>
        <div class="d-unit">${val != null ? 'days' : ''}</div>
      </div>`;
  }

  function closeModal(e) {
    if (e.target === document.getElementById('modal')) closeModalDirect();
  }

  function closeModalDirect() {
    document.getElementById('modal').classList.remove('open');
    document.body.style.overflow = '';
  }

  function fullName(e) {
    const o = e.officers || {};
    return [o.first_name, o.middle_name, o.surname].filter(Boolean).join(' ');
  }

  function showLoading() {
    document.getElementById('table-container').innerHTML = `
      <div class="state-panel">
        <div class="spinner"></div>
        <div class="state-title">Loading entries…</div>
      </div>`;
  }

  function showError(msg) {
    document.getElementById('table-container').innerHTML = `
      <div class="state-panel">
        <div class="state-icon">⚠</div>
        <div class="state-title">Could not load entries</div>
        <div class="state-sub">${msg}</div>
      </div>`;
  }
</script>
</body>
</html>
